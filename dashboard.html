<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>SkillBridge - Dashboard</title>
        <meta name="title" content="SkillBridge - Dashboard" />
        <meta
            name="description"
            content="Your SkillBridge dashboard — tasks you've posted and tasks you're helping with."
        />

        <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./assets/css/style.css" />

        <style>
            .page-hero {
                --section-padding: 200px 50px 40px;
                text-align: center;
            }

            .page-hero .section-text {
                color: var(--alice-blue-2);
                opacity: 0.86;
                max-width: 640px;
                margin: 14px auto 0;
            }

            .dash-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }

            .dash-card {
                padding: 20px;
                border-radius: var(--radius-12);
                border: 1px solid var(--white_a16);
                background: linear-gradient(
                    145deg,
                    hsla(220, 35%, 21%, 0.6),
                    hsla(224, 43%, 14%, 0.45)
                );
                box-shadow:
                    inset 0 1px 0 hsla(0, 0%, 100%, 0.2),
                    0 14px 28px hsla(220, 58%, 5%, 0.3);
            }

            .dash-card .title-sm {
                color: var(--white);
                margin-block-end: 6px;
            }

            .dash-card .dash-meta {
                font-size: 1.3rem;
                color: var(--cadet-grey);
                margin-block-end: 12px;
            }

            .dash-card p {
                color: var(--alice-blue-2);
                opacity: 0.88;
                font-size: 1.4rem;
            }

            .dash-status {
                display: inline-block;
                font-size: 1.2rem;
                font-weight: var(--fw-600);
                color: var(--white);
                background: var(--blue-violet_a10);
                border: 1px solid hsla(262, 83%, 58%, 0.4);
                border-radius: var(--radius-pill);
                padding: 2px 12px;
            }

            .dash-status--done {
                background: hsla(161, 94%, 30%, 0.12);
                border-color: hsla(161, 94%, 30%, 0.4);
                color: hsl(146, 56%, 63%);
            }

            .dash-empty {
                text-align: center;
                padding: 40px 20px;
                color: var(--alice-blue-2);
            }

            .dash-empty .btn {
                margin-block-start: 16px;
            }

            .dash-section-title {
                color: var(--white);
                margin-block-end: 16px;
            }

            @media (min-width: 768px) {
                .page-hero {
                    --section-padding: 232px 64px 48px;
                }
            }
        </style>
    </head>

    <body id="top">
        <header class="header" data-header>
            <div class="container">
                <a href="./index.html">
                    <img
                        src="./assets/images/logo-small.svg"
                        width="40"
                        height="40"
                        alt="SkillBridge home"
                        class="logo-small"
                    />
                    <img
                        src="./assets/images/logo.svg"
                        width="126"
                        height="28"
                        alt="SkillBridge home"
                        class="logo"
                    />
                </a>

                <nav class="navbar" data-navbar>
                    <ul class="navbar-list">
                        <li>
                            <a
                                href="./index.html"
                                class="navbar-link label-lg link:hover"
                                >Home</a
                            >
                        </li>
                        <li>
                            <a
                                href="./browse-skills.html"
                                class="navbar-link label-lg link:hover"
                                >Browse Skills</a
                            >
                        </li>
                        <li>
                            <a
                                href="./community.html"
                                class="navbar-link label-lg link:hover"
                                >Community</a
                            >
                        </li>
                        <li>
                            <a
                                href="./about-us.html"
                                class="navbar-link label-lg link:hover"
                                >About Us</a
                            >
                        </li>
                        <li>
                            <a
                                href="./contact.html"
                                class="navbar-link label-lg link:hover"
                                >Contact</a
                            >
                        </li>
                    </ul>
                </nav>

                <div class="header-action">
                    <button
                        class="btn-icon primary"
                        aria-label="Post a Task"
                        onclick="openTaskModal()"
                    >
                        <ion-icon name="add-circle-outline"></ion-icon>
                    </button>

                    <button
                        class="btn-icon profil-btn"
                        aria-label="SkillBridge account: Jane Doe"
                    >
                        <img
                            src="./assets/images/profile.webp"
                            width="50"
                            height="50"
                            alt="Jane Doe"
                            class="img-cover"
                        />
                    </button>

                    <button
                        class="nav-toggle-btn"
                        aria-label="menu toggle"
                        data-nav-toggler
                    >
                        <ion-icon
                            name="menu-outline"
                            aria-hidden="true"
                            class="default-icon"
                        ></ion-icon>
                        <ion-icon
                            name="close-outline"
                            aria-hidden="true"
                            class="active-icon"
                        ></ion-icon>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <article>
                <section class="section page-hero" aria-label="dashboard">
                    <div class="container">
                        <h1 class="headline-lg" data-reveal>Your Dashboard</h1>
                        <p
                            class="section-text body-lg"
                            data-reveal
                            data-reveal-delay="0.08s"
                        >
                            Track the tasks you've posted and the ones you're
                            helping with — all in one place.
                        </p>
                    </div>
                </section>

                <section class="section" aria-label="my tasks">
                    <div class="container">
                        <h2 class="title-lg dash-section-title">
                            Tasks you've posted
                        </h2>
                        <div id="myTasks" class="dash-grid"></div>
                        <div id="dashState" class="dash-empty"></div>
                    </div>
                </section>
            </article>
        </main>

        <footer class="footer">
            <div class="footer-bottom">
                <div class="container">
                    <p class="body-md text-center copyright">
                        &copy; 2026 SkillBridge Idea MVP.
                    </p>
                </div>
            </div>
        </footer>

        <a
            href="#top"
            class="back-to-top btn-icon"
            aria-label="back to top"
            data-back-top-btn
        >
            <ion-icon name="arrow-up" aria-hidden="true"></ion-icon>
        </a>

        <div class="body-bg-shape"></div>

        <script src="./assets/js/script.js"></script>
        <script type="module" src="./assets/js/firebase-config.js"></script>
        <script type="module" src="./assets/js/auth.js"></script>
        <script type="module" src="./assets/js/tasks.js"></script>

        <script type="module">
            const grid = document.getElementById("myTasks");
            const state = document.getElementById("dashState");
            let unsub = null;

            function esc(s) {
                return String(s || "").replace(
                    /[&<>"]/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        })[c],
                );
            }

            let currentUser = null;

            function card(t) {
                const isDone = t.status === "completed";
                return `
                <article class="dash-card">
                    <h3 class="title-sm">${esc(t.title)}</h3>
                    <p class="dash-meta">${esc(t.category)} &middot; ${esc(t.budget) || "—"}${t.location ? " &middot; " + esc(t.location) : ""}</p>
                    ${t.desc ? `<p>${esc(t.desc)}</p>` : ""}
                    <div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap">
                        <span class="dash-status${isDone ? " dash-status--done" : ""}">${isDone ? "completed" : "open"}</span>
                        <a href="./task.html?id=${esc(t.id)}" class="btn-outline" style="font-size:1.3rem;padding:4px 12px">View</a>
                        ${!isDone ? `<button class="btn-outline dash-done-btn" style="font-size:1.3rem;padding:4px 12px" data-task-id="${esc(t.id)}">Mark done</button>` : ""}
                    </div>
                </article>`;
            }

            function render(tasks) {
                if (!tasks.length) {
                    grid.innerHTML = "";
                    state.innerHTML = `
                        <p>You haven't posted any tasks yet.</p>
                        <button class="btn" onclick="openTaskModal()">Post your first task</button>`;
                    return;
                }
                state.innerHTML = "";
                grid.innerHTML = tasks.map(card).join("");
            }

            grid.addEventListener("click", async (e) => {
                const btn = e.target.closest(".dash-done-btn");
                if (!btn || !currentUser) return;
                const taskId = btn.dataset.taskId;
                if (!taskId) return;
                btn.disabled = true;
                btn.textContent = "Updating…";
                try {
                    await window.SkillBridgeTasks.updateTaskStatus(taskId, "completed", currentUser);
                } catch (err) {
                    console.error("[SkillBridge] updateTaskStatus failed:", err);
                    btn.disabled = false;
                    btn.textContent = "Mark done";
                }
            });

            function showLoggedOut() {
                grid.innerHTML = "";
                state.innerHTML = `
                    <p>Log in to see the tasks you've posted.</p>
                    <button class="btn" id="dashLogin">Log in</button>`;
                const btn = document.getElementById("dashLogin");
                if (btn)
                    btn.addEventListener("click", () => {
                        if (window.SkillBridgeAuth?.isReady())
                            window.SkillBridgeAuth.openModal("login");
                    });
            }

            function apply(user) {
                if (unsub) {
                    unsub();
                    unsub = null;
                }
                if (!window.SkillBridgeTasks?.isReady()) {
                    grid.innerHTML = "";
                    state.innerHTML = `<p>Connect Firebase to enable your live dashboard. (See assets/js/firebase-config.js)</p>`;
                    return;
                }
                if (!user) {
                    showLoggedOut();
                    return;
                }
                currentUser = user;
                state.innerHTML = "<p>Loading your tasks…</p>";
                unsub = window.SkillBridgeTasks.watchMine(user.uid, render);
            }

            document.addEventListener("sb:authchange", (e) =>
                apply(e.detail.user),
            );

            // First paint before auth resolves.
            window.addEventListener("load", () => {
                if (!window.SkillBridgeAuth?.isReady())
                    apply(null);
            });
        </script>

        <script
            type="module"
            src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
        ></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
        ></script>
    </body>
</html>
